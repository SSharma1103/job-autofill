<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Demo Job Application</title>
    <style>
      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        color: #172033;
        background: #f6f8fb;
        font: 15px/1.5 system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      }

      main {
        max-width: 820px;
        margin: 0 auto;
        padding: 32px 18px;
      }

      form {
        display: grid;
        gap: 16px;
      }

      h1,
      p {
        margin-top: 0;
      }

      .field {
        display: grid;
        gap: 6px;
        padding: 14px;
        border: 1px solid #d9dfeb;
        border-radius: 8px;
        background: #ffffff;
      }

      input,
      textarea,
      select {
        width: 100%;
        border: 1px solid #b8c1d3;
        border-radius: 6px;
        padding: 10px;
        font: inherit;
      }

      textarea {
        min-height: 96px;
        resize: vertical;
      }

      button {
        width: fit-content;
        border: 0;
        border-radius: 6px;
        padding: 10px 14px;
        color: #ffffff;
        background: #1455d9;
        font: inherit;
      }
    </style>
  </head>
  <body>
    <main>
      <h1>Demo Job Application</h1>
      <p>Use this page to test the Agent SDK Job Form Filler extension. The submit button is only decorative for the demo.</p>

      <form>
        <label class="field">
          Full name
          <input id="fullName" name="candidate_name" placeholder="Applicant name" />
        </label>

        <label class="field">
          Email address
          <input id="email" type="email" name="email" placeholder="Work email" />
        </label>

        <label class="field">
          Mobile number
          <input id="phone" name="contact_number" placeholder="Phone" />
        </label>

        <label class="field">
          LinkedIn profile
          <input id="linkedin" name="linkedin_url" />
        </label>

        <label class="field">
          GitHub profile
          <input id="github" name="github_url" />
        </label>

        <label class="field">
          Current location
          <input id="location" name="current_location" />
        </label>

        <label class="field">
          Years of experience
          <input id="experience" name="years_of_experience" />
        </label>

        <label class="field">
          Current company
          <input id="company" name="current_company" />
        </label>

        <label class="field">
          Current role
          <input id="role" name="job_title" />
        </label>

        <label class="field">
          Notice period
          <select id="notice" name="availability">
            <option value="">Select one</option>
            <option>Immediate</option>
            <option>15 days</option>
            <option>30 days</option>
            <option>60 days</option>
          </select>
        </label>

        <label class="field">
          Resume
          <input id="resume" type="file" name="resume" />
        </label>

        <label class="field">
          Why should we hire you?
          <textarea id="whyHire" name="why_should_we_hire_you"></textarea>
        </label>

        <label class="field">
          Favorite keyboard layout
          <input id="unknown" name="favorite_keyboard_layout" />
        </label>

        <button type="button">Decorative demo button</button>
      </form>
    </main>
  </body>
</html>
