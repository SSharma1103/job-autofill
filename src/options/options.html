<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Job Form Filler Settings</title>
    <script type="module" src="./options.ts"></script>
  </head>
  <body>
    <main class="page">
      <header>
        <p class="eyebrow">Local autofill</p>
        <h1>Job Form Filler Settings</h1>
        <p>Profile, resume, and generation settings.</p>
      </header>

      <form id="settingsForm">
        <section>
          <h2>Profile</h2>
          <div class="grid">
            <label>Full name <input name="fullName" autocomplete="name" /></label>
            <label>Email <input name="email" autocomplete="email" /></label>
            <label>Phone <input name="phone" autocomplete="tel" /></label>
            <label>LinkedIn <input name="linkedin" /></label>
            <label>GitHub <input name="github" /></label>
            <label>Portfolio <input name="portfolio" /></label>
            <label>Location <input name="location" /></label>
            <label>Current company <input name="currentCompany" /></label>
            <label>Current role <input name="currentRole" /></label>
            <label>Years of experience <input name="yearsOfExperience" /></label>
            <label>Skills <input name="skills" /></label>
            <label>Expected salary <input name="expectedSalary" /></label>
            <label>Notice period <input name="noticePeriod" /></label>
          </div>
        </section>

        <section>
          <h2>Resume</h2>
          <div class="resume-file">
            <label>Resume PDF <input name="resumePdf" type="file" accept="application/pdf,.pdf" /></label>
            <div class="file-row">
              <span id="resumePdfStatus">No PDF selected.</span>
              <button id="clearResumePdf" type="button">Clear PDF</button>
            </div>
          </div>
          <label>Resume text <textarea name="resumeText" rows="8"></textarea></label>
        </section>

        <section id="coverLetterSection">
          <h2>Cover letter</h2>
          <div id="coverLetterContext" class="cover-context">No preview context yet.</div>
          <label>Focus on <textarea id="coverLetterFocus" rows="3" placeholder="Anything the cover letter should emphasize"></textarea></label>
          <div class="inline-actions">
            <button id="generateCoverLetter" type="button">Generate cover letter</button>
          </div>
          <label>Draft <textarea id="coverLetterOutput" rows="10"></textarea></label>
          <label>Iterate <textarea id="coverLetterMessage" rows="3" placeholder="Ask for changes to the draft"></textarea></label>
          <div class="inline-actions">
            <button id="sendCoverLetterMessage" type="button">Send message</button>
            <button id="clearCoverLetter" type="button">Clear thread</button>
          </div>
          <div id="coverLetterThread" class="cover-thread"></div>
        </section>

        <section>
          <div class="section-heading">
            <h2>Custom fields</h2>
            <button id="addCustomField" type="button">Add field</button>
          </div>
          <div id="customFields" class="custom-fields"></div>
        </section>

        <section>
          <h2>API</h2>
          <div class="grid">
            <label>OpenAI API key <input name="openaiApiKey" type="password" autocomplete="off" /></label>
            <label>Model name <input name="modelName" placeholder="gpt-4o-mini" /></label>
            <label class="check"><input name="useAI" type="checkbox" /> Use AI</label>
            <label class="check"><input name="requirePreview" type="checkbox" /> Require preview</label>
          </div>
        </section>

        <footer>
          <button id="saveButton" type="submit">Save</button>
          <button id="clearButton" type="button">Clear data</button>
          <span id="status" role="status"></span>
        </footer>
      </form>
    </main>
  </body>
</html>
