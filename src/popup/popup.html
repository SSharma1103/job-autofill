<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Job Form Filler</title>
    <script type="module" src="./popup.ts"></script>
  </head>
  <body>
    <main class="popup-shell">
      <header>
        <div>
          <p class="eyebrow">Local autofill</p>
          <h1>Job Form Filler</h1>
        </div>
        <button id="optionsButton" type="button" title="Open settings">Settings</button>
      </header>

      <label class="toggle-row">
        <input id="useAI" type="checkbox" />
        <span>Use AI when available</span>
      </label>

      <div class="actions">
        <button id="fillButton" type="button">Fill this page</button>
        <button id="previewButton" type="button">Preview extracted fields</button>
      </div>

      <section id="summary" class="summary" aria-live="polite"></section>
      <pre id="preview" class="preview" hidden></pre>
      <button id="coverLetterButton" class="cover-letter-button" type="button" hidden>Generate Cover Letter</button>
    </main>
  </body>
</html>
